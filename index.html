<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yamin's Master Finance Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #1e3c72; 
            --secondary: #2a5298; 
            --success: #27ae60; 
            --danger: #e74c3c; 
        }

        /* VIBRANT RUNNING GRADIENT */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            color: #333; 
            padding: 20px; 
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #1e3c72, #2a5298);
            background-size: 400% 400%;
            animation: runningGradient 15s ease infinite;
        }

        @keyframes runningGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            max-width: 1750px; 
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px);
        }
        
        .header-section { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .toolbar { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        
        /* Table Layouts */
        .table-wrapper { overflow-x: auto; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; table-layout: fixed; }
        th { background: var(--primary); color: white; padding: 12px 2px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        td { border: 1px solid #eee; padding: 6px 2px; text-align: center; vertical-align: top; }
        
        .week-title { background: var(--primary); color: white; padding: 10px 20px; font-weight: bold; border-radius: 8px 8px 0 0; display: inline-block; margin-top: 20px; }

        /* Weekly Note Area */
        .weekly-note-container { margin-bottom: 40px; }
        .weekly-note { width: 100%; padding: 10px; border: 2px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; font-family: inherit; background: #fdfdfd; box-sizing: border-box; resize: vertical; }

        input { width: 88%; border: 1px solid #ccc; padding: 5px; border-radius: 4px; text-align: center; }
        .desc-box { display: block; margin: 4px auto 0; font-size: 10px; border: none; background: #f1f3f5; color: #777; width: 88%; padding: 2px; font-style: italic; border-radius: 2px; }

        .row-total { font-weight: bold; color: var(--primary); background: #f8faff; vertical-align: middle; }
        
        /* Direct Debit List */
        .dd-table { max-width: 600px; margin-top: 20px; }
        .dd-table input { text-align: left; padding-left: 10px; width: 95%; }

        /* Summaries */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
        .summary-card { padding: 20px; border-radius: 15px; color: white; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-inc { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
        .card-exp { background: linear-gradient(45deg, #eb3349, #f45c43); }
        .card-dd { background: linear-gradient(45deg, #373b44, #4286f4); }
        .card-bal { background: linear-gradient(45deg, #11998e, #38ef7d); }

        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--secondary); transition: 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-save { background: var(--success); }
        .btn-clear { background: var(--danger); }
    </style>
</head>
<body>

<div class="container" id="capture">
    <div class="header-section">
        <h1>WEEKLY INCOME & EXPENSE SHEET</h1>
        <div style="color: #666; font-weight: bold; margin-top: 5px;">Design by Yamin</div>
    </div>

    <div class="toolbar">
        <button class="btn-save" onclick="forceSave()">Manual Save</button>
        <button style="background:#8e44ad" onclick="exportAsImage()">Download JPEG</button>
        <button onclick="downloadBackup()">Export JSON</button>
        <button onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="btn-clear" onclick="clearData()">Clear All</button>
        <input type="file" id="importFile" style="display:none" onchange="importBackup(event)">
    </div>

    <div id="mainTableSpace"></div>

    <h2 style="color: var(--primary); margin-top: 40px;">Monthly Fixed Direct Debits</h2>
    <div class="table-wrapper dd-table">
        <table>
            <thead><tr><th style="width: 70%;">Description</th><th>Amount (£)</th></tr></thead>
            <tbody id="ddBody">
                <tr><td><input type="text" data-key="dd_n1" value="15 Pro Max MB (NatWest)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v1" value="9.65"></td></tr>
                <tr><td><input type="text" data-key="dd_n2" value="16 Pro Max MB (Lloyds)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v2" value="11.95"></td></tr>
                <tr><td><input type="text" data-key="dd_n3" value="16 Pro Max Phone (Lloyds)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v3" value="38.00"></td></tr>
                <tr><td><input type="text" data-key="dd_n4" value="Car Road Tax (NatWest)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v4" value="23.18"></td></tr>
                <tr><td><input type="text" data-key="dd_n5" value="Car Insurance (NatWest)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v5" value="152.98"></td></tr>
                <tr><td><input type="text" data-key="dd_n6" value="Car Breakdown (NatWest)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v6" value="13.83"></td></tr>
                <tr><td><input type="text" data-key="dd_n7" value="Netflix (NatWest)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v7" value="5.99"></td></tr>
                <tr><td><input type="text" data-key="dd_n8" value="iCloud (Halifax)"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v8" value="2.99"></td></tr>
                <tr><td><input type="text" data-key="dd_n9" value="Desh"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v9" value="100.00"></td></tr>
                <tr><td><input type="text" data-key="dd_n10" value="Monthly Rent"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v10" value="590.00"></td></tr>
                <tr><td><input type="text" data-key="dd_n11" value="Tax"></td><td><input type="number" step="0.01" class="dd-input" data-key="dd_v11" value="650.00"></td></tr>
                <tr class="row-total"><td>Direct Debit Total</td><td id="ddTotalDisplay">0.00</td></tr>
            </tbody>
        </table>
    </div>

    <div class="summary-grid" id="summaryArea"></div>
</div>

<script>
const DB_NAME = "YaminFinal_v6";
const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

function init() {
    let container = document.getElementById('mainTableSpace');
    let html = "";

    for (let w = 1; w <= 4; w++) {
        html += `<div class="week-title">WEEK ${w}</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:110px">Day & Date</th>
                        <th>Work</th><th>Carework</th><th>Delivery</th><th>JustEat</th><th>Deliveroo</th><th>Other Inc School</th>
                        <th style="background:#1565c0">Daily Income</th>
                        <th>Petrol</th><th>Car</th><th>House</th><th>Online</th><th>Fixed/Monthly</th><th>Other Exp</th>
                        <th style="background:#c62828">Daily Exp</th>
                    </tr>
                </thead>
                <tbody>`;
        for (let d = 0; d < 7; d++) {
            let rId = `w${w}d${d}`;
            html += `<tr>
                <td style="font-weight:bold">${days[d]}<br><input type="date" class="data-input" data-key="${rId}_date" style="width:95%; font-size:10px; margin-top:2px"></td>`;
            
            // Income
            for(let i=0; i<6; i++) html += `<td><input type="number" step="0.01" class="data-input inc-v-${rId}" data-key="${rId}_i${i}"></td>`;
            html += `<td id="tot_inc_${rId}" class="row-total">0.00</td>`;
            
            // Expenses
            for(let e=0; e<6; e++) {
                html += `<td>
                    <input type="number" step="0.01" class="data-input exp-v-${rId}" data-key="${rId}_e${e}">
                    <input type="text" class="data-input desc-box" data-key="${rId}_e${e}_desc" placeholder="desc...">
                </td>`;
            }
            html += `<td id="tot_exp_${rId}" class="row-total">0.00</td></tr>`;
        }
        html += `</tbody></table></div>
        <div class="weekly-note-container">
            <textarea class="data-input weekly-note" data-key="week_${w}_note" placeholder="Write Week ${w} notes here..."></textarea>
        </div>`;
    }
    container.innerHTML = html;

    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => { calculate(); autoSave(); });
    });

    loadData();
}

function calculate() {
    let grandIncome = 0; let grandExpense = 0;
    for (let w = 1; w <= 4; w++) {
        for (let d = 0; d < 7; d++) {
            let rId = `w${w}d${d}`;
            let rInc = 0; let rExp = 0;
            document.querySelectorAll(`.inc-v-${rId}`).forEach(el => rInc += Number(el.value) || 0);
            document.querySelectorAll(`.exp-v-${rId}`).forEach(el => rExp += Number(el.value) || 0);
            document.getElementById(`tot_inc_${rId}`).innerText = rInc.toFixed(2);
            document.getElementById(`tot_exp_${rId}`).innerText = rExp.toFixed(2);
            grandIncome += rInc; grandExpense += rExp;
        }
    }
    let ddTotal = 0;
    document.querySelectorAll('.dd-input').forEach(el => ddTotal += Number(el.value) || 0);
    document.getElementById('ddTotalDisplay').innerText = ddTotal.toFixed(2);

    document.getElementById('summaryArea').innerHTML = `
        <div class="summary-card card-inc"><h3>Total Income</h3><p>£${grandIncome.toFixed(2)}</p></div>
        <div class="summary-card card-exp"><h3>Daily Expenses</h3><p>£${grandExpense.toFixed(2)}</p></div>
        <div class="summary-card card-dd"><h3>Fixed Direct Debits</h3><p>£${ddTotal.toFixed(2)}</p></div>
        <div class="summary-card card-bal"><h3>Net Profit/Loss</h3><p>£${(grandIncome - grandExpense - ddTotal).toFixed(2)}</p></div>
    `;
}

function autoSave() {
    const data = {};
    document.querySelectorAll('.data-input, .dd-input, .dd-table input[type="text"]').forEach(el => {
        data[el.getAttribute('data-key')] = el.value;
    });
    localStorage.setItem(DB_NAME, JSON.stringify(data));
}

function forceSave() { autoSave(); alert("✅ Data Saved to Device!"); }

function loadData() {
    const saved = localStorage.getItem(DB_NAME);
    if (!saved) return;
    const data = JSON.parse(saved);
    Object.keys(data).forEach(key => {
        const input = document.querySelector(`[data-key="${key}"]`);
        if (input) input.value = data[key];
    });
    calculate();
}

function clearData() { if(confirm("This will wipe all data. Are you sure?")) { localStorage.removeItem(DB_NAME); location.reload(); } }

function downloadBackup() {
    const data = localStorage.getItem(DB_NAME);
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Yamin_Finance_Backup.json`;
    a.click();
}

function importBackup(e) {
    const reader = new FileReader();
    reader.onload = (event) => { localStorage.setItem(DB_NAME, event.target.result); loadData(); };
    reader.readAsText(e.target.files[0]);
}

function exportAsImage() {
    const toolbar = document.querySelector('.toolbar');
    toolbar.style.display = 'none';
    html2canvas(document.getElementById('capture')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Yamin_Finance_Report.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        toolbar.style.display = 'flex';
    });
}

window.onload = init;
</script>
</body>
</html>
