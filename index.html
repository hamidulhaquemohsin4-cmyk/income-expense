<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yamin's Finance Tracker - Animated Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #1e3c72; 
            --secondary: #2a5298; 
            --success: #27ae60; 
            --danger: #e74c3c; 
        }

        /* VIBRANT RUNNING GRADIENT BACKGROUND */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #333; 
            padding: 20px; 
            min-height: 100vh;
            /* Multi-color gradient for a "running" look */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #1e3c72, #2a5298);
            background-size: 400% 400%;
            animation: runningGradient 12s ease infinite;
            display: flex;
            justify-content: center;
        }

        @keyframes runningGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Container */
        .container { 
            max-width: 1750px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .header-section { text-align: center; margin-bottom: 25px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        h1 { color: var(--primary); margin: 0; letter-spacing: 2px; }
        
        .toolbar { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        
        /* Table Styling */
        .table-wrapper { overflow-x: auto; margin-bottom: 40px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; table-layout: fixed; }
        th { background: var(--primary); color: white; padding: 12px 2px; text-transform: uppercase; font-size: 11px; }
        td { border: 1px solid #f0f0f0; padding: 5px 2px; text-align: center; vertical-align: top; }
        
        .week-title { background: rgba(30, 60, 114, 0.1); padding: 12px; font-weight: bold; color: var(--primary); border-radius: 8px 8px 0 0; margin-top: 20px; display: inline-block; }

        /* Input Styles */
        input { width: 88%; border: 1px solid #ddd; padding: 6px; border-radius: 5px; text-align: center; font-weight: 500; }
        input:focus { border-color: var(--secondary); outline: none; background: #fffdf0; box-shadow: 0 0 8px rgba(35, 166, 213, 0.3); }
        
        /* Description Option (Underneath) */
        .desc-box { 
            display: block; 
            margin: 4px auto 0; 
            font-size: 10px; 
            border: none; 
            background: #f8f9fa; 
            color: #777; 
            width: 88%;
            border-radius: 3px;
            padding: 3px;
            font-style: italic;
        }
        .desc-box:focus { background: #fff; color: #333; }

        .row-total { font-weight: bold; color: var(--primary); background: #f8faff; vertical-align: middle; }
        
        /* Summary Boxes */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
        .summary-card { padding: 20px; border-radius: 15px; color: white; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-inc { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
        .card-exp { background: linear-gradient(45deg, #eb3349, #f45c43); }
        .card-dd { background: linear-gradient(45deg, #373b44, #4286f4); }
        .card-bal { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .summary-card h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; opacity: 0.9; }
        .summary-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; }

        /* Buttons */
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-save { background: var(--success); }
        .btn-img { background: #8e44ad; }
        .btn-clear { background: var(--danger); }
    </style>
</head>
<body>

<div class="container" id="capture">
    <div class="header-section">
        <h1>MONTHLY INCOME & EXPENSE</h1>
        <div style="color: #888; font-weight: bold; margin-top: 5px;">Design by Yamin</div>
    </div>

    <div class="toolbar">
        <button class="btn-save" onclick="forceSave()">Manual Save</button>
        <button class="btn-img" onclick="exportAsImage()">Download JPEG</button>
        <button style="background:#444" onclick="downloadBackup()">Export JSON</button>
        <button style="background:#444" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="btn-clear" onclick="clearData()">Clear All</button>
        <input type="file" id="importFile" style="display:none" onchange="importBackup(event)">
    </div>

    <div id="mainTableSpace"></div>

    <h2 style="color: var(--primary); margin-top: 40px; border-left: 5px solid var(--secondary); padding-left: 15px;">Monthly Fixed Direct Debits</h2>
    <table style="max-width: 500px; margin-bottom: 30px;">
        <thead><tr><th style="width: 70%;">Description</th><th>Amount (£)</th></tr></thead>
        <tbody>
            <tr><td>Rent</td><td><input type="number" step="0.01" class="dd-input" data-key="dd_rent"></td></tr>
            <tr><td>Car Insurance</td><td><input type="number" step="0.01" class="dd-input" data-key="dd_carins"></td></tr>
            <tr><td>Road Tax</td><td><input type="number" step="0.01" class="dd-input" data-key="dd_tax"></td></tr>
            <tr><td>Phone 1</td><td><input type="number" step="0.01" class="dd-input" data-key="dd_p1"></td></tr>
            <tr><td>Phone 2</td><td><input type="number" step="0.01" class="dd-input" data-key="dd_p2"></td></tr>
            <tr class="row-total"><td>Total Direct Debits</td><td id="ddTotalDisplay">0.00</td></tr>
        </tbody>
    </table>

    <div class="summary-grid" id="summaryArea"></div>
</div>

<script>
const DB_NAME = "YaminFinance_v5";
const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function init() {
    let container = document.getElementById('mainTableSpace');
    let html = "";

    for (let w = 1; w <= 4; w++) {
        html += `<div class="week-title">WEEK ${w}</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:65px">Day</th><th style="width:130px">Date</th>
                        <th>Work</th><th>Care</th><th>Deliv</th><th>JustE</th><th>Roo</th><th>Bazro</th><th>Sch</th>
                        <th style="background:#1565c0">Income</th>
                        <th>Petrol</th><th>Aldi</th><th>Tesco</th><th>Farm</th><th>Online</th><th>Other</th><th>Desh</th>
                        <th style="background:#c62828">Exp</th>
                    </tr>
                </thead>
                <tbody>`;
        for (let d = 0; d < 7; d++) {
            let rId = `w${w}d${d}`;
            html += `<tr>
                <td style="font-weight:bold; padding-top:15px">${days[d]}</td>
                <td><input type="date" class="data-input" data-key="${rId}_date" style="margin-top:8px"></td>`;
            
            // Income Columns
            for(let i=0; i<7; i++) html += `<td><input type="number" step="0.01" class="data-input inc-v-${rId}" data-key="${rId}_i${i}"></td>`;
            html += `<td id="tot_inc_${rId}" class="row-total">0.00</td>`;
            
            // Expense Columns with Descriptions
            for(let e=0; e<7; e++) {
                html += `<td>
                    <input type="number" step="0.01" class="data-input exp-v-${rId}" data-key="${rId}_e${e}">
                    <input type="text" class="data-input desc-box" data-key="${rId}_e${e}_desc" placeholder="desc...">
                </td>`;
            }
            html += `<td id="tot_exp_${rId}" class="row-total">0.00</td></tr>`;
        }
        html += `</tbody></table></div>`;
    }
    container.innerHTML = html;

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => { calculate(); autoSave(); });
    });

    loadData();
}

function calculate() {
    let grandIncome = 0; let grandExpense = 0;
    for (let w = 1; w <= 4; w++) {
        for (let d = 0; d < 7; d++) {
            let rId = `w${w}d${d}`;
            let rInc = 0; let rExp = 0;
            document.querySelectorAll(`.inc-v-${rId}`).forEach(el => rInc += Number(el.value) || 0);
            document.querySelectorAll(`.exp-v-${rId}`).forEach(el => rExp += Number(el.value) || 0);
            document.getElementById(`tot_inc_${rId}`).innerText = rInc.toFixed(2);
            document.getElementById(`tot_exp_${rId}`).innerText = rExp.toFixed(2);
            grandIncome += rInc; grandExpense += rExp;
        }
    }
    let ddTotal = 0;
    document.querySelectorAll('.dd-input').forEach(el => ddTotal += Number(el.value) || 0);
    document.getElementById('ddTotalDisplay').innerText = ddTotal.toFixed(2);

    document.getElementById('summaryArea').innerHTML = `
        <div class="summary-card card-inc"><h3>Total Income</h3><p>£${grandIncome.toFixed(2)}</p></div>
        <div class="summary-card card-exp"><h3>Daily Expenses</h3><p>£${grandExpense.toFixed(2)}</p></div>
        <div class="summary-card card-dd"><h3>Direct Debits</h3><p>£${ddTotal.toFixed(2)}</p></div>
        <div class="summary-card card-bal"><h3>Net Profit</h3><p>£${(grandIncome - grandExpense - ddTotal).toFixed(2)}</p></div>
    `;
}

function autoSave() {
    const data = {};
    document.querySelectorAll('input[data-key]').forEach(el => {
        if(el.value) data[el.getAttribute('data-key')] = el.value;
    });
    localStorage.setItem(DB_NAME, JSON.stringify(data));
}

function forceSave() { autoSave(); alert("✅ All changes saved to this device!"); }

function loadData() {
    const saved = localStorage.getItem(DB_NAME);
    if (!saved) return;
    const data = JSON.parse(saved);
    Object.keys(data).forEach(key => {
        const input = document.querySelector(`[data-key="${key}"]`);
        if (input) input.value = data[key];
    });
    calculate();
}

function clearData() { if(confirm("Are you sure? This will delete all numbers on this device.")) { localStorage.removeItem(DB_NAME); location.reload(); } }

function downloadBackup() {
    const data = localStorage.getItem(DB_NAME);
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Yamin_Finance_Backup.json`;
    a.click();
}

function importBackup(e) {
    const reader = new FileReader();
    reader.onload = (event) => { localStorage.setItem(DB_NAME, event.target.result); loadData(); };
    reader.readAsText(e.target.files[0]);
}

function exportAsImage() {
    const toolbar = document.querySelector('.toolbar');
    toolbar.style.display = 'none';
    html2canvas(document.getElementById('capture')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Finance_Report.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        toolbar.style.display = 'flex';
    });
}

window.onload = init;
</script>
</body>
</html>
